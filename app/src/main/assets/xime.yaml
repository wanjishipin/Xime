customization:
  distribution_code_name: Xime
  distribution_version: 0.13.3
  generator: "Xime"
  modified_time: "2021-07-26"
  rime_version: 0.14.3

xime_index:
  # 方案/插件/模型市场索引端点（ximeiorg/xime-index）。
  # 可替换为自建代理/镜像，下载器按顺序依次尝试，直到成功为止。
  # 末尾需要 /。
  base_urls:
    - "https://cdn.jsdelivr.net/gh/ximeiorg/xime-index/"
    - "https://fastly.jsdelivr.net/gh/ximeiorg/xime-index/"
    - "https://index.ximei.me/"
    - "https://raw.githubusercontent.com/ximeiorg/xime-index/refs/heads/main/"

style:
  font_size: 14
  candidate_count: 5
  show_code_hint: true
  horizontal: true
  color_scheme: lavender_purple

color_schemes:
  lavender_purple:
    name: "薰衣草紫"
    primary_color: 0x8F73E2
  
  ocean_blue:
    name: "海洋蔚蓝"
    primary_color: 0x1A73E8
  
  forest_green:
    name: "森林翠绿"
    primary_color: 0x2E7D32
  
  sunset_orange:
    name: "落日橙光"
    primary_color: 0xE65100
  
  coral_red:
    name: "珊瑚绯红"
    primary_color: 0xC62828
  
  slate_gray:
    name: "沉稳石墨"
    primary_color: 0x424242
  
  rose_pink:
    name: "浪漫玫瑰"
    primary_color: 0xAD1457
  
  teal_cyan:
    name: "青碧如水"
    primary_color: 0x00796B

# ── 26 键全键盘手势配置 ──
# 每个按键可定义 4 个手势：
#   tap:        点按
#   swipe_up:   上滑
#   swipe_down: 下滑
#   long_press: 长按（数组，弹出气泡后左右滑动选择）
#
# 每个手势的值格式：
#   - 字符串 "a" → 上屏该文本，显示也是它
#   - { label, action, value }
#     label:  按键上显示的文字
#     action: commit（上屏）, command（内置命令）, select_all, copy, cut,
#             paste, clipboard, line_start, line_end, undo, none, repeat
#     value:  上屏时的输出文本（不指定则用 label）
#
# long_press 示例（弹出多个选项供滑动选择）：
#   long_press:
#     - { label: "大写", action: "commit", value: "A" }
#     - { label: "Ä",    action: "commit", value: "ä" }
keyboard:
  keys:
    # ── 第一行 ──
    # long_press 顺序：小写 → 大写 → 带变音符号的相似字母
    # swipe_down 显示对应的五笔字根（action:none 仅显示不上屏）
    q: { tap: "q", swipe_up: "1", swipe_down: { label: "金 钅𠂊勺㐅 犭𱼀", action: "none" }, long_press: ["q", "Q"] }
    w: { tap: "w", swipe_up: "2", swipe_down: { label: "人亻八癶", action: "none" }, long_press: ["w", "W"] }
    e: { tap: "e", swipe_up: "3", swipe_down: { label: "月⺼彡乃用爫彡𧘇豕", action: "none" }, long_press: ["e", "E", "è", "é", "ê", "ë"] }
    r: { tap: "r", swipe_up: "4", swipe_down: { label: "白手龵扌斤𰀪𠂆", action: "none" }, long_press: ["r", "R"] }
    t: { tap: "t", swipe_up: "5", swipe_down: { label: "禾竹丿𠂉彳夂攵", action: "none" }, long_press: ["t", "T"] }
    y: { tap: "y", swipe_up: "6", swipe_down: { label: "言讠文方广亠丶乀", action: "none" }, long_press: ["y", "Y", "ÿ"] }
    u: { tap: "u", swipe_up: "7", swipe_down: { label: "立六辛冫丬门疒丷䒑", action: "none" }, long_press: ["u", "U", "ù", "ú", "û", "ü"] }
    i: { tap: "i", swipe_up: "8", swipe_down: { label: "水氵小氺头𭕄⺌", action: "none" }, long_press: ["i", "I", "ì", "í", "î", "ï"] }
    o: { tap: "o", swipe_up: "9", swipe_down: { label: "火灬米", action: "none" }, long_press: ["o", "O", "ò", "ó", "ô", "õ", "ö", "ø"] }
    p: { tap: "p", swipe_up: "0", swipe_down: { label: "之辶冖宀廴礻", action: "none" }, long_press: ["p", "P"] }

    # ── 第二行 ──
    a: { tap: "a", swipe_up: "!", swipe_down: { label: "工匚戈艹廿龷七弋戈", action: "none" }, long_press: [ "a", "A", "à", "á", "â", "ã", "ä", "å", "æ"] }
    s: { tap: "s", swipe_up: "@", swipe_down: { label: "木丁西", action: "none" }, long_press: ["s", "S", "ß"] }
    d: { tap: "d", swipe_up: "#", swipe_down: { label: "大犬三古龵镸石厂丆", action: "none" }, long_press: ["d", "D"] }
    f: { tap: "f", swipe_up: "$", swipe_down: { label: "土士二干十寸雨", action: "none" }, long_press: ["f", "F"] }
    g: { tap: "g", swipe_up: "%", swipe_down: { label: "王龶五一戋", action: "none" }, long_press: ["g", "G"] }
    h: { tap: "h", swipe_up: "^", swipe_down: { label: "目丨卜⺊上止龰", action: "none" }, long_press: ["h", "H"] }
    j: { tap: "j", swipe_up: "&", swipe_down: { label: "日曰早廾刂虫丿Ⅱ", action: "none" }, long_press: ["j", "J"] }
    k: { tap: "k", swipe_up: "(", swipe_down: { label: "口Ⅲ川", action: "none" }, long_press: ["k", "K"] }
    l: { tap: "l", swipe_up: ")", swipe_down: { label: "田甲囗四罒车皿力", action: "none" }, long_press: ["l", "L"] }

    # ── 第三行 ──
    z: { tap: "z", swipe_up: "|", swipe_down: "Z", long_press: ["z", "Z"] }
    x: { tap: "x", swipe_up: "*", swipe_down: { label: "弓匕纟幺弓𠤎", action: "none" }, long_press: ["x", "X"] }
    c: { tap: "c", swipe_up: "\\", swipe_down: { label: "又巴马厶龴ス", action: "none" }, long_press: [ "c", "C", "ç"] }
    v: { tap: "v", swipe_up: "?", swipe_down: { label: "女刀九臼巛彐", action: "none" }, long_press: [ "v", "V"] }
    b: { tap: "b", swipe_up: "_", swipe_down: { label: "子耳了也阝卩㔾凵", action: "none" }, long_press: ["b", "B"] }
    n: { tap: "n", swipe_up: "-", swipe_down: { label: "已己巳心忄羽乙𠃜", action: "none" }, long_press: ["n", "N", "ñ"] }
    m: { tap: "m", swipe_up: "+", swipe_down: { label: "山由贝冂冎几", action: "none" }, long_press: ["m", "M"] }